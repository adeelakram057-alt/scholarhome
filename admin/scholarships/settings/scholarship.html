<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholarship Details – ScholarPath</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;
  --dark:#0D0D0D;--dark2:#161616;--dark3:#1E1E1E;
  --card:#1A1A1A;--border:rgba(201,168,76,0.2);
  --text:#E8E4DC;--muted:#7A7570;--white:#FAF8F4;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ── TOP BAR ── */
.topbar{background:#080808;border-bottom:1px solid rgba(201,168,76,.35);padding:0 5vw;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.t-logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;color:var(--gold);text-decoration:none}
.t-logo span{color:var(--white)}
.t-back{display:flex;align-items:center;gap:7px;color:var(--muted);text-decoration:none;font-size:.83rem;font-weight:500;padding:6px 14px;border:1px solid var(--border);border-radius:4px;transition:all .2s}
.t-back:hover{color:var(--gold);border-color:var(--gold)}

/* ── HERO BANNER ── */
.sch-banner{padding:60px 5vw 48px;background:var(--dark2);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.banner-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 90% 50%,rgba(201,168,76,.07) 0%,transparent 65%)}
.banner-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:50px 50px}
.banner-inner{position:relative;z-index:1;max-width:900px}
.b-crumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:.78rem;color:var(--muted)}
.b-crumb a{color:var(--muted);text-decoration:none;transition:color .2s}
.b-crumb a:hover{color:var(--gold)}
.b-crumb span{opacity:.4}
.b-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.b-flag{font-size:4rem;line-height:1;flex-shrink:0}
.b-titles{flex:1}
.b-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.bb{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:100px}
.b-open{background:rgba(74,222,128,.12);color:#4ADE80;border:1px solid rgba(74,222,128,.25)}
.b-soon{background:rgba(251,191,36,.12);color:#FBBF24;border:1px solid rgba(251,191,36,.25)}
.b-closed{background:rgba(248,113,113,.12);color:#F87171;border:1px solid rgba(248,113,113,.25)}
.b-new{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.b-titles h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;color:var(--white);line-height:1.1;margin-bottom:10px}
.b-titles p{font-size:1rem;color:var(--muted);line-height:1.65;max-width:640px}

/* funding strip */
.fund-strip{display:flex;gap:0;margin-top:32px;flex-wrap:wrap;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.fs-item{flex:1;min-width:140px;padding:16px 20px;border-right:1px solid var(--border);background:rgba(255,255,255,.02)}
.fs-item:last-child{border-right:none}
.fs-lbl{font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.fs-val{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold)}

/* ── BODY ── */
.sch-body{max-width:1100px;margin:0 auto;padding:56px 5vw;display:grid;grid-template-columns:1fr 340px;gap:40px;align-items:start}

/* main content */
.main-content{}
.section-block{margin-bottom:44px}
.section-block h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--white);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.section-block p{font-size:.92rem;color:var(--text);line-height:1.8;margin-bottom:12px}
.section-block p:last-child{margin-bottom:0}

/* requirements list */
.req-list{display:flex;flex-direction:column;gap:10px}
.req-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;background:rgba(201,168,76,.03);border:1px solid var(--border);border-radius:6px;transition:border-color .2s}
.req-item:hover{border-color:rgba(201,168,76,.35)}
.req-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.req-text{font-size:.88rem;color:var(--text);line-height:1.5}
.req-text strong{color:var(--white);display:block;margin-bottom:2px;font-size:.9rem}

/* timeline */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:16px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:19px;top:36px;bottom:-4px;width:2px;background:var(--border)}
.tl-dot{width:38px;height:38px;border-radius:50%;background:rgba(201,168,76,.12);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;position:relative;z-index:1}
.tl-dot.active{background:rgba(201,168,76,.2);border-color:var(--gold)}
.tl-body{padding:8px 0 24px}
.tl-date{font-size:.75rem;color:var(--gold);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.tl-title{font-size:.95rem;font-weight:600;color:var(--white);margin-bottom:4px}
.tl-desc{font-size:.83rem;color:var(--muted);line-height:1.5}

/* benefits */
.benefits-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ben{padding:14px 16px;background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:6px;transition:border-color .2s}
.ben:hover{border-color:rgba(201,168,76,.35)}
.ben-icon{font-size:1.2rem;margin-bottom:8px}
.ben-title{font-size:.88rem;font-weight:600;color:var(--white);margin-bottom:3px}
.ben-desc{font-size:.8rem;color:var(--muted);line-height:1.4}

/* docs */
.doc-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.doc-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:5px;font-size:.85rem;color:var(--text)}
.doc-item span:first-child{font-size:1rem;flex-shrink:0}

/* sidebar */
.sidebar{}
.side-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.side-card-head{padding:16px 18px;background:rgba(201,168,76,.06);border-bottom:1px solid var(--border);font-size:.82rem;font-weight:600;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.side-rows{display:flex;flex-direction:column}
.srow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem}
.srow:last-child{border-bottom:none}
.srow-lbl{color:var(--muted);flex-shrink:0}
.srow-val{color:var(--white);font-weight:500;text-align:right}

/* apply button */
.apply-btn{display:block;width:100%;text-align:center;background:var(--gold);color:var(--dark);padding:15px;border-radius:6px;font-family:inherit;font-size:.95rem;font-weight:700;text-decoration:none;letter-spacing:.03em;transition:all .2s;margin-bottom:20px}
.apply-btn:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 12px 36px rgba(201,168,76,.3)}

.share-row{display:flex;gap:10px}
.share-btn{flex:1;text-align:center;padding:10px;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:.82rem;cursor:pointer;background:none;font-family:inherit;transition:all .2s}
.share-btn:hover{border-color:var(--gold);color:var(--gold)}

/* related */
.related{border-top:1px solid var(--border);padding-top:48px;margin-top:48px}
.related h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--white);margin-bottom:24px}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.rel-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;text-decoration:none;transition:transform .2s,border-color .2s}
.rel-card:hover{transform:translateY(-4px);border-color:rgba(201,168,76,.4)}
.rc-top{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center}
.rc-flag{font-size:1.6rem}
.rc-body{padding:10px 16px 14px}
.rc-body h4{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--white);margin-bottom:5px;line-height:1.3}
.rc-body p{font-size:.78rem;color:var(--muted);line-height:1.5}
.rc-foot{border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;font-size:.78rem}
.rc-fund{color:var(--gold);font-weight:600}
.rc-lnk{color:var(--gold);font-weight:600}

/* footer */
footer{background:#080808;border-top:1px solid var(--border);padding:28px 5vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.flogo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--gold)}
.fcopy{font-size:.76rem;color:var(--muted)}

@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:820px){
  .sch-body{grid-template-columns:1fr}
  .sidebar{order:-1}
  .benefits-grid,.doc-list{grid-template-columns:1fr}
  .fund-strip{flex-direction:column}
  .fs-item{border-right:none;border-bottom:1px solid var(--border)}
  .fs-item:last-child{border-bottom:none}
}
</style>
</head>
